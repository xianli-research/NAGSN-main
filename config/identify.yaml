defaults:
  - _self_
  - general
  - match@match
  - correct@correct

data_path: ???
batch_size: 64
num_workers_data: 8
num_workers_process: 6
resume:
  log_path: null
  strict_config: true
adapt_correct:
  data_save_path: "cache"
  is_print_bright: true
  matching:
    score_threshold: 0.5
    retain_ratio: 0.85
    min_pairs: 6
  align:
    select_ratio: 0.5
    iter_num: 50
    angle_thres: 1e-6
    trans_thres: 1e-4
  inlier:
    angle_threshold: 0.5
    length_threshold: 2.0
    min_pairs: 6
  mode: "top"
  target_path: "ckpts/test/correct"
  overwrite_target: false
  checkpoint:
    dirpath: ckpts/correct/adapt
    monitor: error_mean
    mode: min
