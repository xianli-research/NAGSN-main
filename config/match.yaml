defaults:
  - _self_
  - general
  - model/match: base
  - dataset: starInfo
  - loss: infonce
train:
  ckpt_path: null
  learning_rate: 0.002
  limit_batches: 1.0
  log_every_n_steps: 10
  precision: 32
  max_epochs: 50
  max_steps: 20000
  batch_size: 16
  num_workers: 8
  shuffle: true
  pin_memory: true
  persistent_workers: true
  lr_scheduler:
    is_open: true
    min_lr: 2e-5
    threshold: 0.001
    factor: 0.8
    patience: 1
    monitor: 'f1'
    interval: 'epoch'
    frequency: 8
val:
  check_interval: null
  check_every_n_epoch: 1
  limit_batches: 1.0
  batch_size: 16
  num_workers: 2
  shuffle: false
  pin_memory: true
  persistent_workers: true
test:
  ckpt_path: null
  batch_size: 16
  num_workers: 8
  shuffle: false
  pin_memory: true
  persistent_workers: true
checkpoint:
  dirpath: ckpts/match
  monitor: f1
  mode: max
data_path: null
logger:
  name: 'match'
